<svg viewBox="0 0 880 600" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Chuyện gì xảy ra khi bạn tạo MR</title>
  <desc>Máy dev chạy pre-push hook rồi push. Trên trang MR, máy tự kiểm bằng CI (test, lint/build, AI review, drift check) và dán kết quả; song song lead duyệt thủ công. Merge khi CI xanh và lead approve.</desc>
  <style>
    .ttl{fill:#1d1d1b;font-weight:700}
    .lbl{fill:#1d1d1b;font-weight:600}
    .sub{fill:#6b6b66}
    .sec{fill:#6b6b66;font-weight:700;letter-spacing:.03em}
    .box{fill:#ffffff;stroke:#d9d9d4;stroke-width:1.5}
    .pane{fill:#faf9f7;stroke:#e2e2dc;stroke-width:1.5}
    .acc{stroke:#cc7a52;stroke-width:2}
    .accfill{fill:#cc7a52}
    .flow{stroke:#8a8a84;stroke-width:2;fill:none}
    .dash{stroke:#a8a8a2;stroke-width:1.4;stroke-dasharray:5 4;fill:none}
  </style>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#8a8a84"/></marker>
  </defs>
  <rect x="0" y="0" width="880" height="600" fill="#ffffff"/>

  <text x="40" y="26" font-size="19" class="ttl">Chuyện gì xảy ra khi bạn tạo MR</text>
  <rect x="690" y="13" width="14" height="14" rx="3" fill="none" class="acc"/>
  <text x="712" y="25" font-size="11.5" class="accfill" font-weight="600">drift check (KB)</text>

  <text x="40" y="50" font-size="11.5" class="sec">1 · MÁY DEV (local)</text>
  <rect x="60" y="58" width="160" height="50" rx="9" class="box"/>
  <text x="140" y="80" text-anchor="middle" font-size="13.5" class="lbl">Code tính năng</text>
  <text x="140" y="97" text-anchor="middle" font-size="10.5" class="sub">theo standards</text>

  <rect x="252" y="58" width="250" height="50" rx="9" class="box"/>
  <text x="377" y="80" text-anchor="middle" font-size="13.5" class="lbl">pre-push hook</text>
  <text x="377" y="97" text-anchor="middle" font-size="10.5" class="sub">cảnh báo sớm · có thể bỏ qua</text>

  <path d="M220,83 L250,83" class="flow" marker-end="url(#a)"/>
  <path d="M377,108 L377,150" class="flow" marker-end="url(#a)"/>
  <text x="389" y="133" font-size="11" class="sub">git push</text>

  <rect x="40" y="152" width="800" height="322" rx="12" class="pane"/>
  <text x="56" y="174" font-size="12.5" class="ttl">TRANG MR — nơi MÁY và NGƯỜI gặp nhau</text>

  <rect x="58" y="186" width="372" height="272" rx="10" class="box"/>
  <text x="74" y="208" font-size="11.5" class="sec">MÁY TỰ KIỂM (CI) · tự động</text>
  <text x="74" y="223" font-size="10" class="sub">chạy trên server khi tạo MR — không ai bấm</text>

  <rect x="74" y="232" width="340" height="34" rx="7" class="box"/><text x="90" y="254" font-size="12.5" class="lbl">Test</text>
  <rect x="74" y="272" width="340" height="34" rx="7" class="box"/><text x="90" y="294" font-size="12.5" class="lbl">Lint / Build</text>
  <rect x="74" y="312" width="340" height="34" rx="7" class="box"/><text x="90" y="334" font-size="12.5" class="lbl">AI review (bot)</text>
  <rect x="74" y="352" width="340" height="34" rx="7" class="box acc"/><text x="90" y="374" font-size="12.5" class="lbl">Drift check — knowledge</text>

  <text x="244" y="424" text-anchor="middle" font-size="12" class="accfill" font-weight="600">→ dán ✓ / ⚠ / ✗ lên MR</text>
  <text x="244" y="443" text-anchor="middle" font-size="10.5" class="sub">kết quả tự hiện trong trang MR</text>

  <rect x="450" y="186" width="372" height="272" rx="10" class="box"/>
  <text x="466" y="208" font-size="11.5" class="sec">LEAD DUYỆT · thủ công</text>
  <text x="466" y="223" font-size="10" class="sub">đọc trên web — KHÔNG cần pull code về</text>

  <text x="470" y="250" font-size="12.5" class="lbl">• Đọc diff trên giao diện MR</text>
  <text x="470" y="282" font-size="12.5" class="lbl">• Theo checklist code-review.md</text>
  <text x="488" y="299" font-size="10.5" class="sub">tờ nhắc việc cho người, không phải lệnh</text>
  <text x="470" y="326" font-size="12.5" class="lbl">• Xem kết quả CI (cột trái)</text>
  <text x="470" y="360" font-size="12.5" class="lbl">• Quyết định: approve / yêu cầu sửa</text>

  <path d="M414,400 C430,400 440,330 448,322" class="dash" marker-end="url(#a)"/>

  <path d="M440,474 L440,498" class="flow" marker-end="url(#a)"/>
  <rect x="318" y="500" width="244" height="50" rx="9" class="box acc"/>
  <text x="440" y="522" text-anchor="middle" font-size="14" class="lbl">Merge vào main</text>
  <text x="440" y="540" text-anchor="middle" font-size="10.5" class="sub">khi CI xanh ✓ + lead approve ✓</text>
</svg>
