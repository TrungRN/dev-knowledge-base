# KB drift check cho GitHub Actions — chạy tự động trên Pull Request.
# Cài: copy file này -> .github/workflows/kb-drift.yml trong project.
#
# Mặc định CẢNH BÁO (không chặn). Muốn CHẶN merge: thêm '--strict' vào lệnh chạy
# và đặt branch protection yêu cầu job này pass.

name: KB drift check
on:
  pull_request:
    branches: [ main ]

jobs:
  kb-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # cần full history để so với nhánh đích
      - name: Run KB drift check
        run: bash .kb-local/ci/kb-drift-check.sh "origin/${{ github.base_ref }}"
