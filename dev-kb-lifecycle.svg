<svg viewBox="0 0 900 640" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Dev KB — cấu trúc và vòng đời sử dụng</title>
  <desc>Phần trên: dev-kb là tri thức chung, mỗi project nối vào qua symlink .kb và có tri thức riêng .kb-local, các project biết nhau qua registry.yaml. Phần dưới: vòng đời gồm Tích hợp và Auto-scan (một lần), rồi Làm việc và PR check drift lặp lại mỗi PR.</desc>
  <style>
    .ttl{fill:#1d1d1b;font-weight:700}
    .lbl{fill:#1d1d1b;font-weight:600}
    .sub{fill:#6b6b66}
    .sec{fill:#6b6b66;font-weight:700;letter-spacing:.04em}
    .box{fill:#ffffff;stroke:#d9d9d4;stroke-width:1.5}
    .acc{stroke:#cc7a52;stroke-width:2}
    .accfill{fill:#cc7a52}
    .dash{stroke:#a8a8a2;stroke-width:1.5;stroke-dasharray:5 4;fill:none}
    .flow{stroke:#8a8a84;stroke-width:2;fill:none}
    .cap{fill:#6b6b66}
  </style>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#8a8a84"/></marker>
    <marker id="aha" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#cc7a52"/></marker>
  </defs>
  <rect x="0" y="0" width="900" height="640" fill="#ffffff"/>

  <text x="450" y="34" text-anchor="middle" font-size="21" class="ttl">Dev KB — Cấu trúc &amp; Vòng đời sử dụng</text>

  <text x="40" y="74" font-size="12" class="sec">1 · CẤU TRÚC</text>

  <rect x="350" y="86" width="200" height="80" rx="10" class="box"/>
  <text x="450" y="120" text-anchor="middle" font-size="16" class="lbl">dev-kb</text>
  <text x="450" y="141" text-anchor="middle" font-size="12" class="sub">tri thức CHUNG</text>
  <text x="450" y="157" text-anchor="middle" font-size="10.5" class="sub">standards · templates · prompts</text>

  <rect x="70" y="196" width="180" height="80" rx="10" class="box"/>
  <text x="160" y="230" text-anchor="middle" font-size="15" class="lbl">Project A</text>
  <text x="160" y="251" text-anchor="middle" font-size="11.5" class="sub">.kb-local · riêng</text>

  <rect x="650" y="196" width="180" height="80" rx="10" class="box"/>
  <text x="740" y="230" text-anchor="middle" font-size="15" class="lbl">Project B</text>
  <text x="740" y="251" text-anchor="middle" font-size="11.5" class="sub">.kb-local · riêng</text>

  <path d="M180,196 L378,166" class="dash"/>
  <path d="M720,196 L522,166" class="dash"/>
  <text x="248" y="176" text-anchor="middle" font-size="10.5" class="cap">.kb symlink</text>
  <text x="652" y="176" text-anchor="middle" font-size="10.5" class="cap">.kb symlink</text>

  <path d="M160,276 L160,306 L740,306 L740,276" class="dash"/>
  <text x="450" y="324" text-anchor="middle" font-size="11" class="cap">registry.yaml — các project biết nhau</text>

  <line x1="40" y1="350" x2="860" y2="350" stroke="#e4e4df" stroke-width="1"/>

  <text x="40" y="378" font-size="12" class="sec">2 · VÒNG ĐỜI SỬ DỤNG</text>

  <text x="235" y="400" text-anchor="middle" font-size="11" class="cap">Một lần — khi tạo project</text>
  <text x="665" y="400" text-anchor="middle" font-size="11" class="accfill" font-weight="600">Hằng ngày — vòng lặp PR</text>

  <rect x="40" y="414" width="175" height="86" rx="10" class="box"/>
  <text x="127" y="450" text-anchor="middle" font-size="15" class="lbl">1 · Tích hợp</text>
  <text x="127" y="471" text-anchor="middle" font-size="11" class="sub">connect-project.sh</text>
  <text x="127" y="487" text-anchor="middle" font-size="10" class="sub">symlink + .kb-local</text>

  <rect x="255" y="414" width="175" height="86" rx="10" class="box"/>
  <text x="342" y="450" text-anchor="middle" font-size="15" class="lbl">2 · Auto-scan</text>
  <text x="342" y="471" text-anchor="middle" font-size="11" class="sub">detect stack</text>
  <text x="342" y="487" text-anchor="middle" font-size="10" class="sub">sinh knowledge</text>

  <rect x="470" y="414" width="175" height="86" rx="10" class="box acc"/>
  <text x="557" y="450" text-anchor="middle" font-size="15" class="lbl">3 · Làm việc</text>
  <text x="557" y="471" text-anchor="middle" font-size="11" class="sub">đọc index TRƯỚC</text>
  <text x="557" y="487" text-anchor="middle" font-size="10" class="sub">theo standards</text>

  <rect x="685" y="414" width="175" height="86" rx="10" class="box acc"/>
  <text x="772" y="450" text-anchor="middle" font-size="15" class="lbl">4 · PR: check drift</text>
  <text x="772" y="471" text-anchor="middle" font-size="11" class="sub">vá knowledge</text>
  <text x="772" y="487" text-anchor="middle" font-size="10" class="sub">acceptance checklist</text>

  <path d="M215,457 L251,457" class="flow" marker-end="url(#ah)"/>
  <path d="M430,457 L466,457" class="flow" marker-end="url(#ah)"/>
  <path d="M645,457 L681,457" class="acc" fill="none" marker-end="url(#aha)"/>

  <path d="M772,500 C772,572 557,572 557,504" class="acc" fill="none" marker-end="url(#aha)"/>
  <text x="664" y="588" text-anchor="middle" font-size="11" class="accfill" font-weight="600">lặp mỗi PR — knowledge luôn khớp code</text>
</svg>
