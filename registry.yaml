# registry.yaml — Danh bạ các project anh em
# Agent tra file này để biết project khác có gì & ở đâu, KHÔNG load cả project.
# Schema thiết kế MCP-ready: giai đoạn 2 có thể bọc dev-knowledge-base thành MCP server
# đọc đúng file này và serve thành tool, không đổi data model.

version: 1
updated: 2026-06-14

# Mỗi project con đăng ký một entry. Chạy scripts/connect-project.sh sẽ thêm tự động.
projects:
  - id: example-legacy-api          # định danh ngắn, duy nhất
    name: "Legacy Payment API"       # tên người-đọc
    path: "../example-legacy-api"    # đường dẫn tương đối từ dev-knowledge-base (cùng cấp)
    status: active                   # active | maintenance | archived
    stack:                           # do auto-scan điền
      languages: [java]
      frameworks: [spring-boot]
      package_manager: maven
    entrypoints:                     # điểm vào quan trọng nhất để hiểu project
      - "src/main/java/.../Application.java"
    kb:
      agents: ".kb-local/AGENTS.md"  # AGENTS.md riêng của project
      repo_map: ".kb-local/repo-map.md"
      llms: ".kb-local/llms.txt"
    docs:
      confluence_space: ""           # để trống nếu chưa dùng (giai đoạn 2)
      repo_url: ""
    owners: ["trungrn67@gmail.com"]
    last_scanned: ""                 # auto-scan cập nhật
    notes: "Đây là entry mẫu — xoá khi nối project thật."

# Hết. Thêm project mới bằng cách copy block trên hoặc chạy connect-project.sh.
