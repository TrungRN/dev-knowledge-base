# registry.yaml — Danh bạ các project anh em
# Agent tra file này để biết project khác có gì & ở đâu, KHÔNG load cả project.
# Schema thiết kế MCP-ready: giai đoạn 2 có thể bọc dev-knowledge-base thành MCP server
# đọc đúng file này và serve thành tool, không đổi data model.
#
# Lưu ý: knowledge riêng project (.kb-local) nằm trong KB trung tâm,
# tại projects/<id>/.kb-local/. Project con truy xuất qua symlink .kb-local.
#
# QUY ƯỚC QUAN TRỌNG: `id` PHẢI bằng đúng TÊN THƯ MỤC của repo project con.
# scripts/link-kb.sh dùng `basename` của project để suy ra projects/<tên>/.kb-local/,
# nên nếu `id` lệch tên thư mục thì đường dẫn kb dưới đây sẽ trỏ sai.
#
# Đây là template — thay <PROJECT-ID> (= tên thư mục), <TÊN>, <PATH> bằng project thật.

version: 2
updated: 2026-06-15

projects:
  - id: <PROJECT-ID>                   # = TÊN THƯ MỤC project con (basename của path)
    name: "<TÊN PROJECT>"              # tên người-đọc (có thể khác id)
    path: "../<project-dir>"          # đường dẫn tương đối từ dev-knowledge-base (cùng cấp); basename phải = id
    status: active                     # active | maintenance | archived
    stack:                             # do auto-scan điền
      languages: []
      frameworks: []
      package_manager: ""
    entrypoints: []                   # điểm vào quan trọng nhất để hiểu project
    kb:
      agents: "AGENTS.md"                                      # nguồn luật chung trong KB
      repo_map: "projects/<PROJECT-ID>/.kb-local/repo-map.md"   # knowledge riêng project (trong KB)
      llms: "projects/<PROJECT-ID>/.kb-local/llms.txt"        # index riêng project (trong KB)
    docs:
      confluence_space: ""            # để trống nếu chưa dùng (giai đoạn 2)
      repo_url: ""                    # URL repo project con
    owners: []
    last_scanned: ""                  # auto-scan cập nhật
    notes: ""

# Hết. Thêm project mới bằng cách copy block trên hoặc chạy kb link <path>.
